<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Central da Voz</title>
    <script>
      // GitHub Pages SPA fallback
      // Saves the current URL to sessionStorage and redirects to the root
      var url = window.location.href;
      sessionStorage.setItem('redirect', url);
      window.location.replace(
        window.location.origin + '/'
      );
    </script>
  </head>
  <body>
    Redirecionando...
  </body>
</html>
